<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Legend of Script</title>
    <style>
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; border: 4px solid #555; box-shadow: 0 0 20px #000; }
        canvas { background: #1e5d1e; display: block; image-rendering: pixelated; }
        #ui { 
            width: 600px; padding: 10px; display: flex; justify-content: space-between; 
            background: #333; border: 4px solid #555; border-bottom: none;
        }
        .heart { color: #ff4d4d; font-size: 20px; }
        .controls { position: absolute; bottom: -50px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="health">HP: <span class="heart">❤❤❤</span></div>
    <div id="inventory">GEMS: <span id="gems">0</span></div>
    <div id="room-name">Forest Entrance</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="controls">ARROWS to move | SPACE to swing Sword | R to Restart</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gemCountText = document.getElementById('gems');
    const healthText = document.getElementById('health');

    // Game Constants
    const TILE_SIZE = 40;
    const WORLD_WIDTH = 15;
    const WORLD_HEIGHT = 10;

    // Game State
    let gameActive = true;
    let frame = 0;
    let player = {
        x: 300, y: 200, w: 30, h: 30,
        speed: 4, hp: 3, gems: 0,
        dir: 'down',
        isAttacking: false,
        attackFrame: 0,
        invuln: 0
    };

    let enemies = [];
    let drops = [];
    let currentRoom = { x: 0, y: 0 };

    // Simple Map Generation (Walls at edges, some random rocks)
    function spawnEnemies() {
        enemies = [];
        for(let i = 0; i < 3; i++) {
            enemies.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: Math.random() * (canvas.height - 60) + 30,
                w: 30, h: 30,
                hp: 2,
                speed: 1 + Math.random(),
                type: 'slime',
                lastDir: {x: 0, y: 0},
                changeDirTimer: 0
            });
        }
    }

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function checkCollision(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
        if(!gameActive) {
            if(keys['KeyR']) location.reload();
            return;
        }

        // 1. Movement
        if (!player.isAttacking) {
            if (keys['ArrowUp']) { player.y -= player.speed; player.dir = 'up'; }
            if (keys['ArrowDown']) { player.y += player.speed; player.dir = 'down'; }
            if (keys['ArrowLeft']) { player.x -= player.speed; player.dir = 'left'; }
            if (keys['ArrowRight']) { player.x += player.speed; player.dir = 'right'; }
        }

        // 2. Attack Logic
        if (keys['Space'] && !player.isAttacking) {
            player.isAttacking = true;
            player.attackFrame = 10;
        }
        if (player.attackFrame > 0) player.attackFrame--;
        else player.isAttacking = false;

        // 3. Keep Player in Bounds / Room Transition
        if (player.x < 0) { player.x = canvas.width - 40; spawnEnemies(); }
        if (player.x > canvas.width - 30) { player.x = 10; spawnEnemies(); }
        if (player.y < 0) { player.y = canvas.height - 40; spawnEnemies(); }
        if (player.y > canvas.height - 30) { player.y = 10; spawnEnemies(); }

        // 4. Enemy AI & Collision
        enemies.forEach((en, index) => {
            // Basic movement
            if(en.changeDirTimer <= 0) {
                en.lastDir = { x: (Math.random() - 0.5) * en.speed, y: (Math.random() - 0.5) * en.speed };
                en.changeDirTimer = 60;
            }
            en.x += en.lastDir.x;
            en.y += en.lastDir.y;
            en.changeDirTimer--;

            // Bounce off walls
            if(en.x < 0 || en.x > canvas.width - en.w) en.lastDir.x *= -1;
            if(en.y < 0 || en.y > canvas.height - en.h) en.lastDir.y *= -1;

            // Player Sword Collision
            if(player.isAttacking) {
                let swordRect = { x: player.x, y: player.y, w: 30, h: 30 };
                if(player.dir === 'up') swordRect.y -= 30;
                if(player.dir === 'down') swordRect.y += 30;
                if(player.dir === 'left') swordRect.x -= 30;
                if(player.dir === 'right') swordRect.x += 30;

                if(checkCollision(swordRect, en)) {
                    en.hp--;
                    // Knockback
                    en.x += (en.x - player.x) * 2;
                    en.y += (en.y - player.y) * 2;
                }
            }

            // Player Damage Collision
            if(checkCollision(player, en) && player.invuln <= 0) {
                player.hp--;
                player.invuln = 60;
                player.x += (player.x - en.x) * 1.5; // Damage knockback
                updateUI();
            }

            if(en.hp <= 0) {
                drops.push({x: en.x, y: en.y, w: 20, h: 20});
                enemies.splice(index, 1);
            }
        });

        // 5. Gems Collection
        drops.forEach((d, i) => {
            if(checkCollision(player, d)) {
                player.gems += 5;
                drops.splice(i, 1);
                updateUI();
            }
        });

        if(player.invuln > 0) player.invuln--;
        if(player.hp <= 0) gameActive = false;

        frame++;
    }

    function updateUI() {
        gemCountText.innerText = player.gems;
        let h = "";
        for(let i=0; i<player.hp; i++) h += "❤";
        healthText.innerHTML = `HP: <span class="heart">${h}</span>`;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Grass Details
        ctx.fillStyle = "#1b551b";
        for(let i=0; i<canvas.width; i+=100) {
            for(let j=0; j<canvas.height; j+=100) {
                ctx.fillRect(i + (frame%10), j, 2, 2);
            }
        }

        // Draw Drops (Gems)
        ctx.fillStyle = "#00ffff";
        drops.forEach(d => ctx.fillText("💎", d.x, d.y + 15));

        // Draw Enemies
        ctx.font = "30px Arial";
        enemies.forEach(en => {
            ctx.fillText("💀", en.x, en.y + 25);
        });

        // Draw Player
        if(player.invuln % 10 < 5) {
            ctx.fillText("🛡️", player.x, player.y + 25);
        }

        // Draw Sword Swing
        if(player.isAttacking) {
            ctx.fillStyle = "white";
            let sx = player.x, sy = player.y;
            if(player.dir === 'up') sy -= 25;
            if(player.dir === 'down') sy += 25;
            if(player.dir === 'left') sx -= 25;
            if(player.dir === 'right') sx += 25;
            ctx.fillText("⚔️", sx, sy + 25);
        }

        if(!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "40px Courier";
            ctx.fillText("GAME OVER", 190, 200);
            ctx.font = "20px Courier";
            ctx.fillText("Press R to Try Again", 190, 240);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    spawnEnemies();
    loop();
</script>
</body>
</html>
