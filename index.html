<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XP GAME OS - CURSED EDITION</title>
    <style>
        :root { --xp-blue: #245edb; }
        body { 
            margin: 0; 
            background: #3a6ea5 url('https://wallpaperaccess.com/full/1560934.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: Tahoma, sans-serif; 
            overflow: hidden; 
            height: 100vh;
            transition: background 0.1s;
        }

        /* Desktop Grid */
        .desktop { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 80px); 
            grid-template-rows: repeat(auto-fill, 90px);
            gap: 20px; 
            padding: 20px; 
            height: calc(100vh - 40px);
        }

        .icon { 
            cursor: pointer; 
            text-align: center; 
            font-size: 11px; 
            text-shadow: 1px 1px 2px black;
        }
        .icon img { 
            width: 42px; height: 42px; display: block; margin: 0 auto 5px; 
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }
        .icon:hover { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* Window Styling */
        .window { 
            position: absolute; 
            background: #ece9d8; 
            border: 3px solid var(--xp-blue); 
            border-radius: 8px 8px 0 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            min-width: 300px;
            z-index: 10;
        }

        .title-bar { 
            background: linear-gradient(to right, #245edb, #3f8cf3); 
            color: white; 
            padding: 5px 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: move; 
            font-weight: bold;
            font-size: 13px;
        }

        .close-btn { 
            background: #e04343; border: 1px solid white; color: white;
            width: 18px; height: 18px; line-height: 14px; text-align: center;
            cursor: pointer; font-size: 12px; font-weight: bold; border-radius: 2px;
        }

        canvas { background: black; display: block; border-top: 1px solid #777; }

        /* Horror Effects */
        #jumpscare { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background-color: black; background-size: contain; 
            background-repeat: no-repeat; background-position: center; z-index: 9999; 
        }

        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%);
            display: flex; align-items: center; z-index: 500;
        }
        .start-btn {
            background: linear-gradient(to bottom, #388e3c 0%, #4caf50 100%);
            border: none; padding: 0 15px; color: white; font-weight: bold;
            font-style: italic; height: 100%; border-radius: 0 10px 10px 0;
        }
    </style>
</head>
<body>

<div class="desktop" id="desktop">
    <!-- Icons are generated via JS for cleanliness -->
</div>

<div id="taskbar"><button class="start-btn">start</button></div>
<div id="jumpscare"></div>
<audio id="scare-snd" src="https://www.myinstants.com/media/sounds/movie_1.mp3"></audio>

<script>
const games = [
    'mario', 'sonic', 'pacman', 'pokemon', 'megaman', 'tetris', 
    'snake', 'pong', 'dodge', 'shooter', 'maze', 'clicker', 
    'runner', 'breaker', 'memory', 'chaos', 'ghost', 'fire', 
    'ice', 'glitch', 'ai', 'survival', 'escape', '???'
];

const desktop = document.getElementById('desktop');

// Initialize Icons
games.forEach(game => {
    const div = document.createElement('div');
    div.className = 'icon';
    div.onclick = () => openGame(game);
    div.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/1068/1068778.png" style="filter: hue-rotate(${Math.random()*360}deg)">${game.toUpperCase()}`;
    desktop.appendChild(div);
});

function openGame(type) {
    const w = document.createElement('div');
    w.className = 'window';
    w.style.left = (50 + Math.random() * 400) + 'px';
    w.style.top = (50 + Math.random() * 200) + 'px';
    
    w.innerHTML = `
        <div class='title-bar'>
            <span>${type}</span>
            <div class="close-btn" onclick="this.closest('.window').remove()">X</div>
        </div>
        <canvas width="300" height="200"></canvas>`;
    
    document.body.appendChild(w);
    drag(w);

    const canvas = w.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    let x = 150, y = 100, vx = 2, vy = 2, frame = 0;

    function loop() {
        if (!document.body.contains(w)) return; // Stop if window closed
        
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, 300, 200);
        frame++;

        switch(type) {
            case 'mario':
                y += vy; vy += 0.5; if(y > 160) { y = 160; vy = -10; } // Auto jump
                ctx.fillStyle = 'red'; ctx.fillRect(50, y, 20, 20);
                ctx.fillStyle = '#8b4513'; ctx.fillRect(0, 180, 300, 20);
                break;

            case 'snake':
                x = (x + vx) % 300;
                ctx.fillStyle = 'lime';
                for(let i=0; i<5; i++) ctx.fillRect(x - (i*10), y, 8, 8);
                break;

            case 'pong':
                x += vx; y += vy;
                if(x<0 || x>290) vx*=-1; if(y<0 || y>190) vy*=-1;
                ctx.fillStyle = 'white'; ctx.fillRect(x, y, 10, 10);
                ctx.fillRect(10, y-20, 5, 40); ctx.fillRect(285, y-20, 5, 40);
                break;

            case 'glitch':
                for(let i=0; i<50; i++) {
                    ctx.fillStyle = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
                    ctx.fillRect(Math.random()*300, Math.random()*200, Math.random()*20, 2);
                }
                break;

            default:
                // Chaos / Random mode
                ctx.fillStyle = 'white';
                ctx.font = '10px Tahoma';
                ctx.fillText("RUNNING ERROR_0x" + frame.toString(16), 10, 20);
                for(let i=0; i<10; i++){
                    ctx.fillStyle = `hsl(${frame % 360}, 100%, 50%)`;
                    ctx.fillRect(Math.random()*300, Math.random()*200, 4, 4);
                }
        }

        // Random glitch chance in window
        if(Math.random() < 0.001) w.style.filter = 'invert(1)';
        else if(Math.random() < 0.1) w.style.filter = 'none';

        requestAnimationFrame(loop);
    }
    loop();
}

function drag(el) {
    const titleBar = el.querySelector('.title-bar');
    titleBar.onmousedown = e => {
        let offsetX = e.clientX - el.offsetLeft;
        let offsetY = e.clientY - el.offsetTop;
        
        // Bring to front
        document.querySelectorAll('.window').forEach(win => win.style.zIndex = 10);
        el.style.zIndex = 100;

        document.onmousemove = e => {
            el.style.left = (e.clientX - offsetX) + 'px';
            el.style.top = (e.clientY - offsetY) + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };
}

function jumpscare() {
    const j = document.getElementById('jumpscare');
    const imgs = [
        'https://i.imgur.com/8QZ7Z7R.jpg',
        'https://i.imgur.com/Z6X8K0k.jpg',
        'https://i.imgur.com/WP7dKXK.jpg'
    ];
    j.style.backgroundImage = `url(${imgs[Math.floor(Math.random()*imgs.length)]})`;
    j.style.display = 'block';
    document.getElementById('scare-snd').play().catch(()=>{});
    
    // Shake screen
    document.body.style.transform = `translate(${Math.random()*20}px, ${Math.random()*20}px)`;
    
    setTimeout(() => {
        j.style.display = 'none';
        document.body.style.transform = 'none';
    }, 400);
}

// Background flickering logic
setInterval(() => {
    if(Math.random() < 0.15) {
        document.body.style.backgroundColor = 'red';
        setTimeout(() => document.body.style.backgroundColor = '', 50);
    }
}, 3000);

// Global jumpscare timer
setInterval(() => {
    if(Math.random() < 0.1) jumpscare();
}, 8000);

</script>
</body>
</html>
