<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows XP - 23 Game Mega-Pack</title>
    <style>
        :root { --xp-blue: #245edb; --xp-taskbar: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%); }
        body { 
            margin: 0; padding: 0; font-family: "Tahoma", sans-serif; 
            background: #3a6ea5 url('https://wallpapercave.com/wp/wp4486939.jpg') no-repeat center center fixed; 
            background-size: cover; overflow: hidden; height: 100vh; user-select: none;
        }

        /* Desktop Icons Grid */
        .desktop { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 90px); 
            grid-template-rows: repeat(auto-fill, 100px);
            gap: 15px; padding: 20px; height: calc(100vh - 40px);
            align-content: start;
        }
        .icon { 
            width: 80px; text-align: center; color: white; text-shadow: 2px 2px 3px black; 
            cursor: pointer; font-size: 11px; font-weight: bold; padding: 5px; border-radius: 3px;
        }
        .icon:hover { background: rgba(255, 255, 255, 0.2); outline: 1px solid rgba(255,255,255,0.3); }
        .icon span { font-size: 40px; display: block; margin-bottom: 5px; }

        /* Window System */
        .window { 
            position: absolute; background: #ece9d8; border: 3px solid var(--xp-blue); 
            border-radius: 8px 8px 0 0; display: flex; flex-direction: column; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5); z-index: 10; width: 420px;
        }
        .title-bar { 
            background: linear-gradient(to right, #245edb, #3f8cf3); color: white; 
            padding: 5px 10px; display: flex; justify-content: space-between; 
            align-items: center; cursor: move; font-weight: bold;
        }
        .close-btn { 
            background: #e04343; color: white; border: 1px solid white; 
            width: 20px; height: 20px; text-align: center; line-height: 16px; 
            cursor: pointer; border-radius: 3px;
        }
        .window-content { padding: 10px; background: #fff; }
        canvas { background: #000; display: block; margin: 0 auto; border: 2px solid #333; }

        /* Taskbar */
        #taskbar { 
            position: absolute; bottom: 0; width: 100%; height: 35px; 
            background: var(--xp-taskbar); display: flex; align-items: center; z-index: 1000; 
        }
        .start-btn { 
            height: 100%; padding: 0 20px; background: linear-gradient(to bottom, #388e3c 0%, #4caf50 100%); 
            border: none; border-top-right-radius: 12px; border-bottom-right-radius: 12px; 
            color: white; font-weight: bold; font-style: italic; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="desktop" id="desktop"></div>
<div id="taskbar"><button class="start-btn">start</button></div>

<script>
    const games = [
        {id:'mario', name:'Super Plumber', icon:'🍄', type:'platformer'},
        {id:'sonic', name:'Blue Speed', icon:'🦔', type:'runner'},
        {id:'zelda', name:'Hero Link', icon:'🛡️', type:'rpg'},
        {id:'pkmn', name:'Monster Catch', icon:'🐾', type:'battle'},
        {id:'mega', name:'Mega Man', icon:'🤖', type:'shooter'},
        {id:'pac', name:'Yellow Eater', icon:'🟡', type:'maze'},
        {id:'tetris', name:'Block Fit', icon:'🧱', type:'puzzle'},
        {id:'snake', name:'Retro Snake', icon:'🐍', type:'snake'},
        {id:'pong', name:'Classic Pong', icon:'🏓', type:'pong'},
        {id:'dodge', name:'Bullet Hell', icon:'🔥', type:'dodge'},
        {id:'space', name:'Invaders', icon:'🚀', type:'shooter'},
        {id:'ghost', name:'Ghost Hunt', icon:'👻', type:'rpg'},
        {id:'race', name:'Turbo Race', icon:'🏎️', type:'runner'},
        {id:'frog', name:'Frog Hop', icon:'🐸', type:'platformer'},
        {id:'chef', name:'Pizza Time', icon:'🍕', type:'clicker'},
        {id:'fish', name:'Fish Eat', icon:'🐟', type:'rpg'},
        {id:'bird', name:'Flappy Box', icon:'🐦', type:'platformer'},
        {id:'ninja', name:'Ninja Slash', icon:'🥷', type:'dodge'},
        {id:'farm', name:'Farm Sim', icon:'🚜', type:'clicker'},
        {id:'ice', name:'Ice Slider', icon:'❄️', type:'maze'},
        {id:'fire', name:'Fire Fighter', icon:'👨‍🚒', type:'shooter'},
        {id:'mine', name:'Gold Mine', icon:'⛏️', type:'clicker'},
        {id:'ufo', name:'UFO Abduction', icon:'🛸', type:'rpg'}
    ];

    const desktop = document.getElementById('desktop');
    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    // Create Icons
    games.forEach(g => {
        const div = document.createElement('div');
        div.className = 'icon';
        div.onclick = () => openWindow(g);
        div.innerHTML = `<span>${g.icon}</span>${g.name}`;
        desktop.appendChild(div);
    });

    function openWindow(game) {
        const winId = 'win_' + Math.random().toString(36).substr(2,9);
        const win = document.createElement('div');
        win.className = 'window';
        win.id = winId;
        win.style.left = (Math.random() * 200 + 50) + 'px';
        win.style.top = (Math.random() * 100 + 50) + 'px';
        
        win.innerHTML = `
            <div class="title-bar" onmousedown="drag(this.parentElement)">
                <span>${game.name}</span>
                <div class="close-btn" onclick="document.getElementById('${winId}').remove()">X</div>
            </div>
            <div class="window-content">
                <canvas id="canvas_${winId}" width="400" height="300"></canvas>
                <div style="font-size:11px; margin-top:5px; color:#666;">Arrows to Move | Space to Action</div>
            </div>`;
        document.body.appendChild(win);
        startGame(game, `canvas_${winId}`);
    }

    function drag(el) {
        el.onmousedown = e => {
            if(e.target.className === 'close-btn') return;
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
            el.style.zIndex = 100;
            let ox = e.clientX - el.offsetLeft, oy = e.clientY - el.offsetTop;
            document.onmousemove = e => {
                el.style.left = (e.clientX - ox) + "px";
                el.style.top = (e.clientY - oy) + "px";
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    function startGame(game, cvsId) {
        const canvas = document.getElementById(cvsId);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let player = {x:50, y:200, w:30, h:30, dy:0, j:false, hp:3};
        let objects = [];
        let frame = 0;
        let score = 0;

        function run() {
            if(!document.getElementById(cvsId)) return;
            ctx.clearRect(0,0,400,300);
            frame++;

            // Draw Background based on type
            if(game.type === 'platformer' || game.type === 'runner') {
                ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,400,300);
                ctx.fillStyle = '#7bc67b'; ctx.fillRect(0,250,400,50);
            } else if(game.type === 'rpg' || game.type === 'maze') {
                ctx.fillStyle = '#222'; ctx.fillRect(0,0,400,300);
            } else {
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,400,300);
            }

            // Game Logic Switch
            switch(game.type) {
                case 'platformer':
                    if(keys['Space'] && !player.j) { player.dy = -12; player.j = true; }
                    player.dy += 0.6; player.y += player.dy;
                    if(player.y > 220) { player.y = 220; player.j = false; }
                    if(frame % 80 === 0) objects.push({x:400, y:230, w:20, h:20, t:'enemy'});
                    break;
                
                case 'rpg':
                    if(keys['ArrowUp']) player.y -= 3;
                    if(keys['ArrowDown']) player.y += 3;
                    if(keys['ArrowLeft']) player.x -= 3;
                    if(keys['ArrowRight']) player.x += 3;
                    if(frame % 100 === 0) objects.push({x:Math.random()*350, y:Math.random()*250, w:15, h:15, t:'coin'});
                    break;

                case 'shooter':
                    if(keys['ArrowUp']) player.y -= 5;
                    if(keys['ArrowDown']) player.y += 5;
                    if(keys['Space'] && frame % 10 === 0) objects.push({x:player.x+30, y:player.y+10, w:10, h:5, t:'bullet'});
                    if(frame % 50 === 0) objects.push({x:400, y:Math.random()*250, w:20, h:20, t:'enemy'});
                    break;

                case 'snake':
                    if(frame % 5 === 0) {
                        if(keys['ArrowRight']) vx=5; if(keys['ArrowLeft']) vx=-5;
                    }
                    player.x += (frame % 2 === 0) ? 2 : 0; // Simplified for demo
                    break;
            }

            // Render Player
            ctx.font = "30px Arial";
            ctx.fillText(game.icon, player.x, player.y);

            // Render Objects
            objects.forEach((obj, i) => {
                if(obj.t === 'enemy') {
                    obj.x -= 4;
                    ctx.fillText("👾", obj.x, obj.y);
                    if(obj.x < player.x + 20 && obj.x + 20 > player.x && obj.y < player.y + 20 && obj.y + 20 > player.y) {
                        score = 0; objects.splice(i, 1); // Collision
                    }
                }
                if(obj.t === 'bullet') {
                    obj.x += 7;
                    ctx.fillStyle = 'yellow'; ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                }
                if(obj.t === 'coin') {
                    ctx.fillText("💎", obj.x, obj.y);
                    if(Math.abs(player.x - obj.x) < 20 && Math.abs(player.y - obj.y) < 20) {
                        score++; objects.splice(i,1);
                    }
                }
            });

            // UI
            ctx.fillStyle = "white";
            ctx.font = "14px Tahoma";
            ctx.fillText("Score: " + score, 10, 20);

            requestAnimationFrame(run);
        }
        run();
    }
</script>
</body>
</html>
