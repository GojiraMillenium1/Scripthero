<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XP GAME OS - FULL EDITION</title>
<style>
body{margin:0;background:#0a0a0a;color:white;font-family:Tahoma;overflow:hidden}
.desktop{display:grid;grid-template-columns:repeat(6,80px);gap:10px;padding:20px}
.icon{cursor:pointer;text-align:center;font-size:11px}
.window{position:absolute;background:#111;border:2px solid #0f0;display:none}
.title{background:#0f0;color:black;padding:3px;cursor:move}
canvas{background:black}
#jumpscare{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background-size:cover;z-index:999}
</style>
</head>
<body>

<div class="desktop">
  <div class="icon" onclick="openGame('mario')">Mario</div>
  <div class="icon" onclick="openGame('sonic')">Sonic</div>
  <div class="icon" onclick="openGame('pacman')">Pacman</div>
  <div class="icon" onclick="openGame('pokemon')">Pokemon</div>
  <div class="icon" onclick="openGame('megaman')">Megaman</div>
  <div class="icon" onclick="openGame('tetris')">Tetris</div>
  <div class="icon" onclick="openGame('snake')">Snake</div>
  <div class="icon" onclick="openGame('pong')">Pong</div>
  <div class="icon" onclick="openGame('dodge')">Dodge</div>
  <div class="icon" onclick="openGame('shooter')">Shooter</div>
  <div class="icon" onclick="openGame('maze')">Maze</div>
  <div class="icon" onclick="openGame('clicker')">Clicker</div>
  <div class="icon" onclick="openGame('runner')">Runner</div>
  <div class="icon" onclick="openGame('breaker')">Breaker</div>
  <div class="icon" onclick="openGame('memory')">Memory</div>
  <div class="icon" onclick="openGame('chaos')">Chaos</div>
  <div class="icon" onclick="openGame('ghost')">Ghost</div>
  <div class="icon" onclick="openGame('fire')">Fire</div>
  <div class="icon" onclick="openGame('ice')">Ice</div>
  <div class="icon" onclick="openGame('glitch')">Glitch</div>
  <div class="icon" onclick="openGame('ai')">AI</div>
  <div class="icon" onclick="openGame('survival')">Survival</div>
  <div class="icon" onclick="openGame('escape')">Escape</div>
  <div class="icon" onclick="openGame('???')">???</div>
</div>

<div id="jumpscare"></div>
<audio id="s" src="https://www.myinstants.com/media/sounds/movie_1.mp3"></audio>

<script>
function openGame(type){
  const w=document.createElement('div');
  w.className='window';
  w.style.left=Math.random()*600+'px';
  w.style.top=Math.random()*300+'px';
  w.innerHTML=`<div class='title'>${type} <span onclick="this.parentElement.parentElement.remove()">X</span></div><canvas width=300 height=200></canvas>`;
  document.body.appendChild(w);
  w.style.display='block';
  drag(w);

  const ctx=w.querySelector('canvas').getContext('2d');

  let x=150,y=100,vx=2,vy=2;

  function loop(){
    ctx.fillStyle='black';ctx.fillRect(0,0,300,200);

    switch(type){
      case 'mario':
        y+=vy;vy+=0.5;if(y>160){y=160;vy=0}
        ctx.fillStyle='red';ctx.fillRect(50,y,20,20);
        break;

      case 'sonic':
        x=(x+10)%300;
        ctx.fillStyle='blue';ctx.fillRect(x,150,20,20);
        break;

      case 'pacman':
        ctx.fillStyle='yellow';ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();
        x+=vx;y+=vy;
        break;

      case 'pokemon':
        ctx.fillStyle='white';ctx.fillText('Battle!',120,100);
        break;

      case 'megaman':
        ctx.fillStyle='cyan';ctx.fillRect(x,y,20,20);
        x+=vx;
        break;

      default:
        for(let i=0;i<20;i++){
          ctx.fillStyle=`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
          ctx.fillRect(Math.random()*300,Math.random()*200,5,5);
        }
    }

    if(Math.random()<0.002) jumpscare();
    requestAnimationFrame(loop);
  }
  loop();
}

function drag(el){
  el.onmousedown=e=>{
    let x=e.clientX,y=e.clientY;
    document.onmousemove=e=>{
      el.style.left=el.offsetLeft+(e.clientX-x)+'px';
      el.style.top=el.offsetTop+(e.clientY-y)+'px';
      x=e.clientX;y=e.clientY;
    };
    document.onmouseup=()=>document.onmousemove=null;
  }
}

function jumpscare(){
  const j=document.getElementById('jumpscare');
  const imgs=[
    'https://i.imgur.com/8QZ7Z7R.jpg',
    'https://i.imgur.com/Z6X8K0k.jpg',
    'https://i.imgur.com/WP7dKXK.jpg'
  ];
  j.style.backgroundImage=`url(${imgs[Math.floor(Math.random()*imgs.length)]})`;
  j.style.display='block';
  document.getElementById('s').play().catch(()=>{});
  setTimeout(()=>j.style.display='none',500);
}

setInterval(()=>{
  if(Math.random()<0.3){
    document.body.style.background=`rgb(${Math.random()*255},0,0)`;
  }
},2000);

setInterval(()=>{
  if(Math.random()<0.2) jumpscare();
},6000);
</script>

</body>
</html>
